<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
            }

            form {
                border: 3px solid #f1f1f1;
            }

            input[type=text], input[type=password] {
                width: 100%;
                padding: 12px 20px;
                margin: 8px 0;
                display: inline-block;
                border: 1px solid #ccc;
                box-sizing: border-box;
            }

            button {
                background-color: #4169E1;
                color: white;
                padding: 14px 20px;
                margin: 8px 0;
                border: none;
                cursor: pointer;
                width: 100%;
            }

            button:hover {
                opacity: 0.8;
            }

            .cancelbtn {
                width: auto;
                padding: 10px 18px;
                background-color: #f44336;
            }

            .imgcontainer {
                text-align: center;
                margin: 24px 0 12px 0;
            }

            img.avatar {
                width: 40%;
                border-radius: 50%;
            }

            .container {
                padding: 16px;
            }

            span.psw {
                float: right;
                padding-top: 16px;
            }

            @media screen and (max-width: 300px) {
                span.psw {
                    display: block;
                    float: none;
                }

                .cancelbtn {
                    width: 100%;
                }
            }
        </style>
        <title>Rajeev</title>
    </head>
    <body>
        <!-- <h2 align="center">Price Display Unit Advanced Login</h2> -->
        <!-- <h3 align="center" style="color:#FF4D4D;">PROCEED AT OWN RISK</h3> -->
        <div class="container">
            <label for="uname">
                <b>Username</b>
            </label>
            <input type="text" placeholder="Enter Username" name="uname" Id="uname" required>
            <label for="pword">
                <b>Password</b>
            </label>
            <input type="password" placeholder="Enter Password" name="pword" Id="pword" required>
            <button type="button" onclick="formToLogin()">Login</button>
        </div>
        <!-- <div class="container" style="background-color:#D3DCF8">
            <span>
                Neenjas Technologies Private Limited <a href="http://www.neenjastechnologies.com/">(Website)</a>
                2024
            </span>
        </div> -->
    </body>
    <script language="JavaScript">
        function formToLogin() {
            var usname = document.getElementById('uname').value;
            var psword = document.getElementById('pword').value;
            var login_data = "{\"username\":\"" + usname + "\",\"password\":\"" + psword + "\"}";
            var xhttp = new XMLHttpRequest();
            xhttp.onreadystatechange = function() {
                if (this.readyState == 4) {
                    if (200 == xhttp.status)
                        window.location = "advanced_settings";
                    else
                        alert("Incorrect Username or Password");
                }
            }
            ;
            xhttp.open("POST", "/rdu/adv_auth");
            xhttp.send(login_data);
        }
    </script>
</html>
